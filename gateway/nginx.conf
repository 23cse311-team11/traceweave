events {
    worker_connections 1024;
}

http {

    # -----------------------------
    # Upstream Services
    # -----------------------------
    upstream core_api {
        server core-api:4000;
    }

    upstream ai_service {
        server ai-service:5000;
    }

    upstream frontend {
        server frontend:3000;
    }

    # -----------------------------
    # HTTP Server - redirect to HTTPS
    # -----------------------------
    server {
        listen 80;
        server_name app.traceweavesupply.tech;

        # Redirect all HTTP to HTTPS
        return 301 https://$host$request_uri;
    }

    # -----------------------------
    # HTTPS Server
    # -----------------------------
    server {
        listen 443 ssl;
        server_name app.traceweavesupply.tech;

        # SSL certificate paths (Let’s Encrypt)
        ssl_certificate /etc/letsencrypt/live/app.traceweavesupply.tech/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/app.traceweavesupply.tech/privkey.pem;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers on;

        # AI Service
        location /api/v1/analyze {
            proxy_pass http://ai_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Core API (all other /api)
        location /api/ {
            proxy_pass http://core_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Frontend
        location / {
            proxy_pass http://frontend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
        }
    }
}
