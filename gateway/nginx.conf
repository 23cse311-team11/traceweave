events {
    worker_connections 1024;
}

http {

    # -----------------------------
    # Upstream Services
    # -----------------------------
    upstream core_api {
        server core-api:4000;
    }

    upstream ai_service {
        server ai-service:5000;
    }

    # -----------------------------
    # HTTP → HTTPS Redirect
    # -----------------------------
    server {
        listen 80;
        server_name api.traceweavesupply.tech;

        return 301 https://$host$request_uri;
    }

    # -----------------------------
    # HTTPS Server
    # -----------------------------
    server {
        listen 443 ssl;
        server_name api.traceweavesupply.tech;

        ssl_certificate /etc/letsencrypt/live/api.traceweavesupply.tech/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/api.traceweavesupply.tech/privkey.pem;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers on;

        # -----------------------------
        # Route /api/v1/analyze → AI Service
        # -----------------------------
        location /api/v1/analyze {
            proxy_pass http://ai_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # -----------------------------
        # Route ALL other /api calls → Core API
        # -----------------------------
        location /api/ {
            proxy_pass http://core_api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # -----------------------------
        # Root Health Check
        # -----------------------------
        location / {
            return 200 'TraceWeave Gateway Running';
            add_header Content-Type text/plain;
        }
    }
}
