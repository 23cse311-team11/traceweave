version: "3.8"

services:

  core-api:
    build:
      context: ./backend/core-api
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ./backend/core-api/.env.prod
    networks:
      - traceweave-network

  ai-service:
    build:
      context: ./backend/ai-service
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ./backend/ai-service/.env.prod
    networks:
      - traceweave-network

  proxy-service:
    build:
      context: ./backend/proxy-service
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ./backend/proxy-service/.env.prod
    networks:
      - traceweave-network

  gateway:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"   
    volumes:
      - ./gateway/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - core-api
      - ai-service
      - frontend

  # -----------------------------------------------------------------
  # DATA LAYER
  # -----------------------------------------------------------------

  mongo:
    image: mongo:6
    container_name: traceweave-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
  #------------------------------------------------------------------
  #FRONTEND
  #------------------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: traceweave-frontend
    ports:
      - "3000:3000"
    depends_on:
      - core-api
      - ai-service  
volumes:
  mongo_data:
