version: "3.8"

services:

  # -------------------------------------------------
  # Core API (Node.js)
  # -------------------------------------------------
  core-api:
    build:
      context: ./backend/core-api
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ./backend/core-api/.env.prod
    networks:
      - traceweave-network

  # -------------------------------------------------
  # AI Service (Python / FastAPI)
  # -------------------------------------------------
  ai-service:
    build:
      context: ./backend/ai-service
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ./backend/ai-service/.env.prod
    networks:
      - traceweave-network

  # -------------------------------------------------
  # Proxy Service (MitmProxy)
  # -------------------------------------------------
  proxy-service:
    build:
      context: ./backend/proxy-service
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ./backend/proxy-service/.env.prod
    networks:
      - traceweave-network

  # -------------------------------------------------
  # API Gateway (Nginx)
  # -------------------------------------------------
  gateway:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./gateway/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - core-api
      - ai-service
    networks:
      - traceweave-network

# -------------------------------------------------
# Network
# -------------------------------------------------
networks:
  traceweave-network:
