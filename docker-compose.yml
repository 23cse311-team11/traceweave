version: "3.8"

services:

  core-api:
    build:
      context: ./backend/core-api
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ./backend/core-api/.env.prod
    networks:
      - traceweave-network

  ai-service:
    build:
      context: ./backend/ai-service
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ./backend/ai-service/.env.prod
    networks:
      - traceweave-network

  proxy-service:
    build:
      context: ./backend/proxy-service
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ./backend/proxy-service/.env.prod
    networks:
      - traceweave-network

  gateway:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"   
    volumes:
      - ./gateway/nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - core-api
      - ai-service
    networks:
      - traceweave-network

networks:
  traceweave-network:
